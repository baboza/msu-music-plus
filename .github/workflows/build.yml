name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build:
    name: Build APK and AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.1.1'
          cache-disabled: true

      - name: Build Debug APK (For Phone Testing)
        run: gradle assembleDebug

      - name: Build Release AAB (For Play Store)
        run: gradle bundleRelease

      - name: Setup Keystore and Sign AAB
        run: |
          if [ ! -f "keystore.jks" ]; then
            echo "Keystore not found. Generating a new one..."
            keytool -genkey -v -keystore keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias msumusic -storepass msumusic2024 -keypass msumusic2024 -dname "CN=MSU Music, OU=MSU, O=MSU, L=Mahasarakham, S=Mahasarakham, C=TH"
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add keystore.jks
            git commit -m "Add auto-generated keystore [skip ci]"
            git push
          fi
          echo "Signing the AAB..."
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore keystore.jks -storepass msumusic2024 -keypass msumusic2024 app/build/outputs/bundle/release/app-release.aab msumusic

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: msu-music-plus-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: msu-music-plus-aab
          path: app/build/outputs/bundle/release/*.aab
